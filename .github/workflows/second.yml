<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Logic Storyboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #d2a8ff; /* Purple for Cache */
            --danger: #f85149;
            --success: #3fb950;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper { width: 100%; max-width: 900px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: var(--accent); }

        .action-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
        }

        .action-btn:hover { border-color: var(--accent); }
        .action-btn.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent); 
        }

        .story-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-header {
            padding: 20px;
            background: rgba(210, 168, 255, 0.1);
            border-bottom: 1px solid var(--border);
            font-size: 1.2em;
            font-weight: bold;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .side { padding: 30px; background: var(--card); }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .challenge-title { color: var(--danger); }
        .solution-title { color: var(--success); }

        .code-box {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            margin-top: 15px;
            color: #d1d5db;
            border-left: 3px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Cache Logic: Challenge & Solution</h1>
        <p>The "Master Librarian" Workflow</p>
    </header>

    <div class="action-selector">
        <div class="action-btn" onclick="showStory('restore')">actions/cache/restore</div>
        <div class="action-btn" onclick="showStory('logic')">Conditional Logic (if:)</div>
        <div class="action-btn" onclick="showStory('save')">actions/cache/save</div>
    </div>

    <div id="display-area"></div>
</div>

<script>
    const data = {
        restore: {
            name: "🔍 Step 1: The Search (cache/restore)",
            challenge: "Every time you run a build, you spend 5-10 minutes downloading dependencies or compiling files that haven't changed since yesterday.",
            solution: "We search the 'Global Store' using a unique fingerprint (the Git Commit SHA). If we find a match, we instantly teleport those files onto the runner, skipping the build entirely.",
            code: "- uses: actions/cache/restore@v4\n  id: cache-search\n  with:\n    key: build-id-${{ github.sha }}"
        },
        logic: {
            name: "🏗️ Step 2: Smart Decisions (if:)",
            challenge: "How does the runner know whether to work or relax? Without logic, it might accidentally overwrite good files or run unnecessary tasks.",
            solution: "We use the 'outputs.cache-hit' variable. If it's true, the runner skips the 'Logic Execution' step. If it's false, the runner rolls up its sleeves and starts building.",
            code: "if: steps.cache-search.outputs.cache-hit != 'true'\nrun: echo \"Building fresh...\""
        },
        save: {
            name: "📦 Step 3: Registering (cache/save)",
            challenge: "If you build something new, it only exists on that temporary runner. When the job ends, that hard work is lost forever.",
            solution: "At the end of the job, we take the new 'output/' folder and upload it to the Global Store under that specific ID. Now, the next time you run this exact commit, it will be found in Step 1.",
            code: "- uses: actions/cache/save@v4\n  if: steps.cache-search.outputs.cache-hit != 'true'\n  with:\n    path: output/\n    key: build-id-${{ github.sha }}"
        }
    };

    function showStory(key) {
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase().includes(key)) btn.classList.add('active');
        });

        const item = data[key];
        document.getElementById('display-area').innerHTML = `
            <div class="story-container">
                <div class="panel-header">${item.name}</div>
                <div class="content-grid">
                    <div class="side">
                        <h3 class="challenge-title">🔴 The Challenge</h3>
                        <p>${item.challenge}</p>
                    </div>
                    <div class="side">
                        <h3 class="solution-title">🟢 The Solution</h3>
                        <p>${item.solution}</p>
                        <div class="code-box">${item.code.replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
            </div>
        `;
    }

    showStory('restore');
</script>

</body>
</html>
